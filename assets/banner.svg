<svg viewBox="0 0 1280 960" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'JetBrains Mono', 'DejaVu Sans Mono', 'Courier New', monospace">
  <!-- window frame -->
  <rect x="6" y="6" width="1268" height="948" rx="44" fill="#5f7183"/>
  <rect x="30" y="30" width="1220" height="900" rx="26" fill="#1b2531"/>

  <!-- traffic lights -->
  <circle cx="104" cy="96" r="17" fill="#ff5f56"/>
  <circle cx="160" cy="96" r="17" fill="#febc2e"/>
  <circle cx="216" cy="96" r="17" fill="#27c93f"/>

  <!-- built in public by Artifacts -->
  <text x="1035" y="106" text-anchor="end" font-size="26" fill="#c3c9d0">Built in public by</text>
  <text x="1052" y="108" font-size="30" font-weight="700" fill="#ffffff">Artifacts</text>
  <g stroke-linecap="round">
    <line x1="1052" y1="120" x2="1214" y2="120" stroke="#2f6df0" stroke-width="3"/>
    <line x1="1052" y1="126" x2="1214" y2="126" stroke="#f2711c" stroke-width="3"/>
    <line x1="1052" y1="132" x2="1214" y2="132" stroke="#16b8b8" stroke-width="3"/>
    <line x1="1052" y1="138" x2="1214" y2="138" stroke="#35c759" stroke-width="3"/>
  </g>

  <!-- chevron prompt -->
  <path d="M100 270 L184 324 L100 378" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- title -->
  <g fill="#f4f6f8" font-weight="700" font-size="128">
    <text x="212" y="362">Newsletter</text>
    <text x="212" y="500">Context</text>
    <text x="212" y="638">Kit</text>
  </g>

  <!-- pixel crab -->
  <g fill="#cf7052">
    <rect x="112" y="740" width="76" height="30" rx="2"/>
    <rect x="124" y="726" width="12" height="16"/>
    <rect x="164" y="726" width="12" height="16"/>
    <rect x="98" y="748" width="14" height="9"/>
    <rect x="188" y="748" width="14" height="9"/>
    <rect x="118" y="770" width="11" height="11"/>
    <rect x="171" y="770" width="11" height="11"/>
  </g>
  <rect x="127" y="752" width="8" height="9" fill="#6f3a2a"/>
  <rect x="165" y="752" width="8" height="9" fill="#6f3a2a"/>

  <!-- tagline -->
  <text x="228" y="748" font-size="46">
    <tspan fill="#cbd0d6">Teach your </tspan><tspan fill="#ffffff" font-weight="700">AI agents</tspan><tspan fill="#cbd0d6"> how you</tspan>
  </text>
  <text x="228" y="804" font-size="46" fill="#cbd0d6">think and write</text>
</svg>
